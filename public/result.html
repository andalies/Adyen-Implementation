<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do pagamento — Resgatinhos</title>
    <link rel="stylesheet" href="./lib/bootstrap.min.css">
    <link rel="shortcut icon" type="image" href="./images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Lora&family=Sacramento&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="https://checkoutshopper-test.adyen.com/checkoutshopper/sdk/6.40.1/adyen.css">
    <style> body { background:#fee1ee; } </style>
</head>
<body>
    <div class="container text-center" style="max-width: 560px; margin-top: 12vh;">
        <h1 class="fs-1 text-colored" style="font-family:'Sacramento',cursive;">Resgatinhos</h1>
        <div id="result" class="mt-4">
            <p class="mt-3 text-muted">Confirmando seu pagamento…</p>
        </div>
        <a href="./index.html" class="btn fw-bold mt-3">Voltar à loja</a>
    </div>

    <script src="https://checkoutshopper-test.adyen.com/checkoutshopper/sdk/6.40.1/adyen.js"></script>
    <script>
    (async function () {
        var params = new URLSearchParams(window.location.search);
        var sessionId = params.get("sessionId");
        var redirectResult = params.get("redirectResult");
        var box = document.getElementById("result");

        function show(type, icon, text) {
            box.innerHTML =
                '<div class="alert alert-' + type + '"><i class="bi ' + icon +
                ' me-1"></i>' + text + "</div>";
        }

        // Direct visit (no redirect happened) — nothing to finalize.
        if (!sessionId || !redirectResult) {
            show("info", "bi-info-circle", "Nenhum pagamento em andamento.");
            return;
        }

        try {
            var config = await (await fetch("/api/config")).json();
            var { AdyenCheckout } = window.AdyenWeb;

            var checkout = await AdyenCheckout({
                environment: config.environment,
                clientKey: config.clientKey,
                countryCode: "BR",
                locale: "pt-BR",
                analytics: { enabled: false },
                session: { id: sessionId },
                onPaymentCompleted: function (r) { outcome(r.resultCode); },
                onPaymentFailed: function (r) { outcome(r && r.resultCode); },
                onError: function (e) { show("danger", "bi-x-circle", "Erro: " + e.message); },
            });

            // Hand the redirect result back to Adyen to get the final outcome.
            checkout.submitDetails({ details: { redirectResult: redirectResult } });
        } catch (e) {
            show("danger", "bi-x-circle", e.message);
        }

        function outcome(code) {
            if (code === "Authorised") {
                localStorage.removeItem("resgatinhos_cart");
                show("success", "bi-check-circle-fill", "Pagamento aprovado! Obrigada 🐾");
            } else if (code === "Pending" || code === "Received") {
                show("info", "bi-hourglass-split", "Pagamento pendente de confirmação.");
            } else if (code === "Refused") {
                show("danger", "bi-x-circle", "Pagamento recusado.");
            } else {
                show("warning", "bi-exclamation-triangle", "Resultado: " + (code || "desconhecido"));
            }
        }
    })();
    </script>
</body>
</html>
